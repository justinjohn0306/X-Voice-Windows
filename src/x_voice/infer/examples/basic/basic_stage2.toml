# Basic X-Voice Stage2 drop-text inference config.
# Update ckpt_file and srp_ckpt_file to real local checkpoints before running.

model = "XVoice_v1_Base_Stage2"
model_cfg = ""
ckpt_file = "ckpts/XVoice_v1_Base_Stage2_vocos_ipa_v6_XVoice_Dataset/model_70000.pt"
vocab_file = ""

srp_ckpt_file = "ckpts/SpeedPredict_Multilingual/model_28000.pt"
srp_model_cfg = ""

ref_audio = "infer/examples/basic/basic_ref_en.wav"
ref_text = ""
gen_text = "I don't really care what you call me. I've been a silent spectator, watching species evolve, empires rise and fall. But always remember, I am mighty and enduring."
gen_file = ""

gen_lang = "en"
auto_detect_lang = false
normalize_text = true

output_dir = "tests"
output_file = "infer_cli_droptext_basic.wav"
save_chunk = false
remove_silence = false

vocoder_name = "vocos"
load_vocoder_from_local = true

target_rms = 0.1
cross_fade_duration = 0.15
nfe_step = 32
cfg_strength = 2.5
cfg_strength2 = 4.0
cfg_schedule = "square"
cfg_decay_time = 0.6
sway_sampling_coef = -1.0
speed = 1.0

denoise_ref = true
loudness_norm = true
post_processing = true
reverse = false
